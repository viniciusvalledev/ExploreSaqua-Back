<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f8fafc;
        font-family: "Poppins", Arial, sans-serif;
        color: #334155;
        -webkit-font-smoothing: antialiased;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 12px;
        padding: 40px 30px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      }
      .logo-container {
        text-align: center;
        margin-bottom: 30px;
      }
      .brand-line {
        height: 4px;
        width: 60px;
        background-color: #0284c7;
        margin: 0 auto 30px auto;
        border-radius: 2px;
      }
      h1 {
        color: #0f172a;
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 20px;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 20px;
        color: #475569;
      }
      .btn-container {
        text-align: center;
        margin: 35px 0;
      }
      .btn {
        background-color: #0284c7;
        color: #ffffff !important;
        text-decoration: none;
        padding: 14px 32px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        display: inline-block;
      }
      .divider {
        border-top: 1px solid #e2e8f0;
        margin: 40px 0 20px 0;
      }
      .footer {
        text-align: center;
        font-size: 13px;
        color: #94a3b8;
        line-height: 1.5;
      }
      .raw-link {
        color: #0284c7;
        word-break: break-all;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo-container">
        <img
          src="https://exploresaqua.saquarema.rj.gov.br/Logo_Explore.png"
          alt="Explore-Saqua"
          width="200"
          style="display: block; margin: 0 auto"
        />
      </div>
      <div class="brand-line"></div>

      <h1>Solicitação Rejeitada</h1>
      <p>Olá,</p>
      <p>
        Lamentamos informar que a sua solicitação referente ao local
        <strong>[NOME_LOCAL]</strong> não foi aprovada.
      </p>

      <div
        style="
          background-color: #f8fafc;
          border-left: 4px solid #0284c7;
          padding: 15px 20px;
          margin: 30px 0;
          border-radius: 0 8px 8px 0;
        "
      >
        <p style="margin: 0; font-size: 15px; color: #0f172a">
          <strong>Motivo:</strong>
        </p>
        <p style="margin: 5px 0 0 0; font-size: 15px; color: #475569">
          [MOTIVO_REJEICAO]
        </p>
      </div>

      <p>
        Para mais detalhes ou dúvidas, por favor, entre em contato com a nossa
        equipe.
      </p>

      <div class="divider"></div>

      <div class="footer">
        <p>&copy; 2026 ExploreSaqua. Todos os direitos reservados.</p>
      </div>
    </div>
  </body>
</html>
